version: "3.9"

services:
  # ──────────────────────────────────────────────
  # PostgreSQL Database
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: famicare-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: famicare
      POSTGRES_PASSWORD: famicare_secret
      POSTGRES_DB: famicare_db
    volumes:
      - famicare_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U famicare -d famicare_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - famicare-network

  # ──────────────────────────────────────────────
  # pgAdmin (DB Management UI)
  # ──────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4
    container_name: famicare-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@famicare.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - famicare-network

  # ──────────────────────────────────────────────
  # Backend (FastAPI)
  # ──────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: famicare-backend
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://famicare:famicare_secret@postgres:5432/famicare_db
      APP_ENV: development
      BACKEND_URL: http://localhost:8001
      FRONTEND_URL: http://localhost:3001
      UPLOAD_DIR: /app/uploads
      # Add other secrets as needed via .env or directly here
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - ./backend/.env.local
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./backend/uploads:/app/uploads
    networks:
      - famicare-network

  # ──────────────────────────────────────────────
  # Frontend (Next.js)
  # ──────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: famicare-frontend
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8001
      NEXT_PUBLIC_LINE_LOGIN_URL: http://localhost:8001/auth/login
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend
    networks:
      - famicare-network

networks:
  famicare-network:
    driver: bridge

volumes:
  famicare_pgdata:
    driver: local
