name: FamiCare CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ── Frontend CI ─────────────────────────────────────────────
  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build frontend (Check for errors)
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          
      - name: Security audit
        run: npm audit --audit-level=high || true # Warn but don't fail for now
        
      - name: Run Frontend Tests

        run: npm test -- --run # Run tests in CI mode (no watch)


  # ── Backend CI ──────────────────────────────────────────────
  backend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Lint check (Optional but recommended)
        run: |
          pip install flake8
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run Backend Tests
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          pytest

  # ── Continuous Deployment ───────────────────────────────────
  deploy:
    name: Deploy to Railway
    needs: [frontend-check, backend-check]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Railway CLI
        run: npm install -g @railway/cli
        
      - name: Deploy Backend
        run: railway up --service backend -d
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          
      - name: Deploy Frontend
        run: railway up --service frontend -d
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
